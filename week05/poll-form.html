<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ojofeyitimi Richard">
    <title>WDD 130 | HTML Form - User Poll</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header></header>

    <main>
        <!-- Title matching title-casing format -->
        <h1>WDD 130 | HTML Form - User Poll</h1>

        <form action="#" method="post">

            <!-- Box 1: Contact Information Grouping -->


            <!-- Box 2: Questions Grouping -->
            <fieldset>
                <legend>Questions</legend>

                <div class="form-item">
                    <label for="browser">What is your favorite internet browser?</label>
                    <select name="browser" id="browser">
                        <option value="chrome">Chrome</option>
                        <option value="edge">Edge</option>
                        <option value="firefox">Firefox</option>
                        <option value="safari">Safari</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-item">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>

                <div class="form-item vertical">
                    <label for="feedback">List the places you have lived:</label>
                    <textarea id="feedback" name="feedback" rows="4"
                      placeholder="Stillwater Florida,&#10;Amsterdam Netherlands,&#10;Timbuktu Mali"></textarea>
                </div>
            </fieldset>

            <!-- Submit Button matching the gray button element -->
            <button type="submit">Submit Poll</button>

        </form>
    </main>

    <footer>
        <p>&copy;2026 | HTML Form - User Poll Activity | Ojofeyitimi Richard</p>
    </footer>
</body>

</html>

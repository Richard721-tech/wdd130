<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ojofeyitimi Richard">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>Basic HTML and CSS Quiz</header>

    <main>
        <!-- Title matching title-casing format -->


        <form action="#" method="post">
            <fieldset>
                <legend> Quiz </legend>

                <div class="form-item">
                    <label for="Questions">1. What does the acronym CSS stand for?</label>
                    <input type="text" id="Questions" name="Questions" required>
                </div>

                <div class="form-item">
                    <label for="Questions">2. How are id and class attributes selected in
                        CSS?</label>
                    <textarea id="Questions" name="Questions" rows="5" cols="77"></textarea>
                </div>


                <div class="form-item">
                    <label for="Questions">3. Which of the following is a valid CSS comment?</label>
                    <select name="Questions" id="Questions">
                        <option value="choose one">Choose one....</option>
                        <option value="edge">Edge</option>
                        <option value="firefox">Firefox</option>
                        <option value="safari">Safari</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-item">
                    <label for="Questions">4. What is the bottom margin given this
                        declaration? <div class="challenge"> 10px 5px 15px;</div></label>
                    <input type="text" id="Questions" name="Questions" required>
                </div>

                <button type="submit">Submit Quiz</button>

            </fieldset>

        </form>

    </main>
</body>

</html>

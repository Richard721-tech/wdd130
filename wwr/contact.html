<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ojofeyitimi Richard">
    <meta name="description"
      content="This page tells about how to contact our rafting company, make general inquiry, and website suggestion.">
    <title>About Us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <div class="page-container">

        <header>
            <nav class="main-nav">
                <img src="images/z-crossedoars.jpeg" alt="Rapids Rafting Logo" class="logo">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="hero">
                <h1>Richy DOS WATER RAFTING COMPANY!</h1>

                <div class="reach">
                    <div class="address">
                        <p>licenscing office beside fidelity bank, challenge Ibadan</p>
                    </div>
                    <div class="phone">
                        <p>+2349153629057</p>
                    </div>
                    <div class="gmail">
                        <p>info@richydoswater.com</p>
                    </div>
                </div>

                <div class="main-content-row">
                    <article class="map-box">
                        <iframe
                          src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d7914.08474997293!2d3.875878115983204!3d7.349138624306348!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1781096624450!5m2!1sen!2sng"
                          width="400" height="450" allowfullscreen="" loading="lazy"
                          referrerpolicy="no-referrer-when-downgrade" class="map-frame"></iframe>
                    </article>

                    <article class="hero-overlay">
                        <form action="#" method="post">
                            <div class="form-item">
                                <label for="name">Name:</label>
                                <input type="text" id="name" name="name" required>
                            </div>

                            <div class="form-item">
                                <label for="useremail">Email: </label>
                                <input type="email" id="useremail" name="useremail" required>
                            </div>

                            <div class="form-item purpose-group">
                                <label class="purpose-label">Purpose of Message:</label>
                                <div class="radio-options">
                                    <div>
                                        <input type="radio" id="inquiry" name="purpose"
                                          value="General Inquiry">
                                        <label for="inquiry">General Inquiry</label>
                                    </div>
                                    <div>
                                        <input type="radio" id="reservation" name="purpose"
                                          value="Reservation Question">
                                        <label for="reservation">Reservation Question</label>
                                    </div>
                                    <div>
                                        <input type="radio" id="suggestion" name="purpose"
                                          value="Website Suggestion">
                                        <label for="suggestion">Website Suggestion</label>
                                    </div>
                                </div>
                            </div>

                            <div class="form-item vertical">
                                <label for="feedback">Message</label>
                                <textarea id="feedback" name="feedback" rows="14" cols="200"
                                  placeholder="type here"></textarea>
                            </div>

                            <div class="form-item">
                                <label for="subscription">Subscribe me to the monthly
                                    newsletter</label>
                                <input type="checkbox" id="subscription" name="subscription">
                            </div>

                            <button type="submit">Get in Touch!</button>
                        </form>
                    </article>
                </div>
            </div>

            <section class="Adventure-section">
                <h2>Adventure Awaits You!</h2>
                <div class="views">
                    <figure>
                        <img src="images/humanitarian.jpeg" alt="Human Resources Profile Picture">
                        <figcaption>Human Resources!</figcaption>
                    </figure>
                    <figure>
                        <img src="images/jesus-christ.jpg" alt="Our Manager Profile Picture">
                        <figcaption>our Manager!</figcaption>
                    </figure>
                    <figure>
                        <img src="images/water-rafting-clark.jpeg" alt="Our Clark Profile Picture">
                        <figcaption>Our Clark!</figcaption>
                    </figure>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 RICHY DOS WATER RAFTING COMPANY | Ojofeyitimi Richard</p>
            <nav class="socialmedia">
                <a href="https://facebook.com">
                    <img src="images/facebook.svg" alt="facebook icon">
                </a>
                <a href="https://wa.me">
                    <img src="images/whatsapp.svg" alt="whatsapp icon">
                </a>
                <a href="https://instagram.com">
                    <img src="images/instagram.svg" alt="instagram icon">
                </a>
            </nav>
        </footer>

    </div>
</body>

</html>
